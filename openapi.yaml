openapi: 3.0.3
info:
  title: Task Planning API
  description: REST API for laboratory work 06, variant 10, task planning with Redis caching, rate limiting, and RabbitMQ domain events.
  version: 1.2.0
servers:
  - url: http://localhost:8080
security:
  - bearerAuth: []
paths:
  /ping:
    get:
      summary: Service health check
      security: []
      responses:
        '200':
          description: Service is alive
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status:
                    type: string
                    example: ok
  /api/users:
    post:
      summary: Create a new user
      description: Creates a user in PostgreSQL and publishes the user.created domain event to RabbitMQ.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
  /api/auth/login:
    post:
      summary: Login and get a simple bearer token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Token created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/users/by-login:
    get:
      summary: Find user by login
      parameters:
        - name: login
          in: query
          required: true
          schema:
            type: string
          example: ivan
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/users/search:
    get:
      summary: Search users by first or last name mask
      parameters:
        - name: mask
          in: query
          required: true
          schema:
            type: string
          example: iv
      responses:
        '200':
          description: Matching users
          headers:
            X-RateLimit-Limit:
              $ref: '#/components/headers/XRateLimitLimit'
            X-RateLimit-Remaining:
              $ref: '#/components/headers/XRateLimitRemaining'
            X-RateLimit-Reset:
              $ref: '#/components/headers/XRateLimitReset'
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
  /api/goals:
    post:
      summary: Create a goal
      description: Creates a goal in PostgreSQL, invalidates the Redis goals cache, and publishes the goal.created domain event to RabbitMQ.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGoalRequest'
      responses:
        '201':
          description: Goal created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Goal'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    get:
      summary: List all goals
      responses:
        '200':
          description: Goals list
          headers:
            X-Cache:
              $ref: '#/components/headers/XCache'
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Goal'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/goals/{goalId}/tasks:
    parameters:
      - name: goalId
        in: path
        required: true
        schema:
          type: integer
          minimum: 1
        example: 1
    post:
      summary: Create a task for a goal
      description: Creates a task in PostgreSQL, invalidates the Redis goal tasks cache, and publishes the task.created domain event to RabbitMQ.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
      responses:
        '201':
          description: Task created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    get:
      summary: List tasks for a goal
      responses:
        '200':
          description: Goal tasks
          headers:
            X-Cache:
              $ref: '#/components/headers/XCache'
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/goals/{goalId}/tasks/{taskId}/status:
    patch:
      summary: Change task status
      description: Updates task status in PostgreSQL, invalidates the Redis goal tasks cache, writes status_changed activity to MongoDB, and publishes the task.status_changed domain event to RabbitMQ.
      parameters:
        - name: goalId
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
          example: 1
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaskStatusRequest'
      responses:
        '200':
          description: Task status changed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/goals/{goalId}/tasks/{taskId}/comments:
    parameters:
      - name: goalId
        in: path
        required: true
        schema:
          type: integer
          minimum: 1
        example: 1
      - name: taskId
        in: path
        required: true
        schema:
          type: integer
          minimum: 1
        example: 1
    post:
      summary: Add a comment to a task
      description: Stores a task comment document in MongoDB task_comments and publishes the task.comment_added domain event to RabbitMQ.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskCommentRequest'
      responses:
        '201':
          description: Comment created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskComment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    get:
      summary: List task comments
      description: Returns comments for a task from MongoDB task_comments sorted by creation time.
      responses:
        '200':
          description: Task comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TaskComment'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
  /api/goals/{goalId}/tasks/{taskId}/activity:
    get:
      summary: List task activity history
      description: Returns activity events for a task from MongoDB task_activity sorted by creation time.
      parameters:
        - name: goalId
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
          example: 1
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
          example: 1
      responses:
        '200':
          description: Task activity events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TaskActivity'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: token-{userId}
  headers:
    XCache:
      description: Redis cache status for Cache-Aside endpoints.
      schema:
        type: string
        enum: [HIT, MISS]
        example: HIT
    XRateLimitLimit:
      description: Maximum number of requests allowed in the current fixed window.
      schema:
        type: integer
        example: 60
    XRateLimitRemaining:
      description: Remaining requests in the current fixed window.
      schema:
        type: integer
        example: 42
    XRateLimitReset:
      description: Unix timestamp when the current fixed window ends.
      schema:
        type: integer
        example: 1716537600
  responses:
    BadRequest:
      description: Invalid JSON, empty required field, or invalid task status
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Unauthorized:
      description: Missing or invalid bearer token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Requested user, goal, or task was not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: Login already exists
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    TooManyRequests:
      description: Rate limit exceeded for the authenticated user.
      headers:
        X-RateLimit-Limit:
          $ref: '#/components/headers/XRateLimitLimit'
        X-RateLimit-Remaining:
          $ref: '#/components/headers/XRateLimitRemaining'
        X-RateLimit-Reset:
          $ref: '#/components/headers/XRateLimitReset'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error: rate limit exceeded
  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: user not found
    CreateUserRequest:
      type: object
      required: [login, password, firstName, lastName, email, phone, role]
      properties:
        login:
          type: string
          example: ivan
        password:
          type: string
          example: '12345'
        firstName:
          type: string
          example: Ivan
        lastName:
          type: string
          example: Ivanov
        email:
          type: string
          format: email
          example: ivan@example.com
        phone:
          type: string
          example: '+79990000000'
        role:
          type: string
          example: manager
    User:
      type: object
      required: [id, login, firstName, lastName, email, phone, role]
      properties:
        id:
          type: integer
          example: 1
        login:
          type: string
          example: ivan
        firstName:
          type: string
          example: Ivan
        lastName:
          type: string
          example: Ivanov
        email:
          type: string
          example: ivan@example.com
        phone:
          type: string
          example: '+79990000000'
        role:
          type: string
          example: manager
    LoginRequest:
      type: object
      required: [login, password]
      properties:
        login:
          type: string
          example: ivan
        password:
          type: string
          example: '12345'
    LoginResponse:
      type: object
      required: [token]
      properties:
        token:
          type: string
          example: token-1
    CreateGoalRequest:
      type: object
      required: [title, description]
      properties:
        title:
          type: string
          example: Сдать лабораторные
        description:
          type: string
          example: Закрыть все лабораторные по архитектуре ИС
    Goal:
      type: object
      required: [id, title, description, authorId, status]
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: Сдать лабораторные
        description:
          type: string
          example: Закрыть все лабораторные по архитектуре ИС
        authorId:
          type: integer
          example: 1
        status:
          type: string
          example: active
    CreateTaskRequest:
      type: object
      required: [title, description, assigneeId, dueDate]
      properties:
        title:
          type: string
          example: Сделать REST API
        description:
          type: string
          example: Реализовать endpoints для варианта 10
        assigneeId:
          type: integer
          example: 1
        dueDate:
          type: string
          format: date
          example: '2026-06-01'
    Task:
      type: object
      required:
        [id, goalId, title, description, assigneeId, authorId, status, dueDate]
      properties:
        id:
          type: integer
          example: 1
        goalId:
          type: integer
          example: 1
        title:
          type: string
          example: Сделать REST API
        description:
          type: string
          example: Реализовать endpoints для варианта 10
        assigneeId:
          type: integer
          example: 1
        authorId:
          type: integer
          example: 1
        status:
          type: string
          enum: [new, in_progress, done, cancelled]
          example: new
        dueDate:
          type: string
          format: date
          example: '2026-06-01'
    UpdateTaskStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [new, in_progress, done, cancelled]
          example: in_progress
    CreateTaskCommentRequest:
      type: object
      required: [text]
      properties:
        text:
          type: string
          minLength: 1
          maxLength: 2000
          example: API comment from MongoDB endpoint
        tags:
          type: array
          items:
            type: string
          example: [api, mongo]
    EmbeddedUser:
      type: object
      required: [userId, login, displayName]
      properties:
        userId:
          type: integer
          example: 1
        login:
          type: string
          example: alexey
        displayName:
          type: string
          example: Alexey Sokolov
    TaskComment:
      type: object
      required: [id, taskId, goalId, author, text, tags, createdAt, updatedAt]
      properties:
        id:
          type: string
          description: MongoDB ObjectId as hex string
          example: 6651f9a7d4f1f3c4a7b8c901
        taskId:
          type: integer
          example: 1
        goalId:
          type: integer
          example: 1
        author:
          $ref: '#/components/schemas/EmbeddedUser'
        text:
          type: string
          minLength: 1
          maxLength: 2000
          example: API comment from MongoDB endpoint
        tags:
          type: array
          items:
            type: string
          example: [api, mongo]
        createdAt:
          type: string
          format: date-time
          example: '2026-05-24T10:00:00Z'
        updatedAt:
          type: string
          format: date-time
          example: '2026-05-24T10:00:00Z'
    TaskActivity:
      type: object
      required: [id, taskId, goalId, type, actor, payload, visibleTo, important, createdAt]
      properties:
        id:
          type: string
          description: MongoDB ObjectId as hex string
          example: 6651fa02d4f1f3c4a7b8c902
        taskId:
          type: integer
          example: 1
        goalId:
          type: integer
          example: 1
        type:
          type: string
          enum: [task_created, status_changed, assignee_changed, comment_added, deadline_changed]
          example: status_changed
        actor:
          $ref: '#/components/schemas/EmbeddedUser'
        payload:
          type: object
          additionalProperties: true
          example:
            newStatus: in_progress
        visibleTo:
          type: array
          items:
            type: integer
          example: [1, 2]
        important:
          type: boolean
          example: true
        createdAt:
          type: string
          format: date-time
          example: '2026-05-24T10:00:00Z'
